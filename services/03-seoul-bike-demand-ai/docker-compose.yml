version: "3.9"

services:
  backend:
    build:
      context: ./ai-server
    container_name: seoul-bike-api # 이름 바꾸는것을 권장

    ports:
      - "8000:8000"

    volumes:
      - ./ai-server:/app

    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: seoul-bike-react # 위의 container_name과는 달라야 함

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

    restart: always
